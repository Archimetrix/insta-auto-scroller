<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insta Super Features</title>
  <link rel="stylesheet" href="style.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="glass-container">
    
    <div class="header-wrapper">
      <img src="imgs/icon32.png" alt="Logo" class="header-logo">
      <h1 class="title">Insta Super Features</h1>
    </div>
    
    <button id="startStopButton" class="liquid-button">
      <span>Start</span>
      <div class="liquid"></div>
    </button>

    <div class="toggles-wrapper">

      <div class="toggle-section">
        <p>Show Download Button</p>
        <label class="toggle-container">
          <input type="checkbox" id="showDownloadToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-section">
        <p>Auto Open Reels Tab</p>
        <label class="toggle-container">
          <input type="checkbox" id="autoRedirectToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-section">
        <p>Auto Comments</p>
        <label class="toggle-container">
          <input type="checkbox" id="autoCommentsToggle"> 
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-section">
        <p>Auto Start Reels</p>
        <label class="toggle-container">
          <input type="checkbox" id="autoReelsToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-section">
        <p>Auto Unmute</p>
        <label class="toggle-container">
          <input type="checkbox" id="autoUnmuteToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-section">
        <p>Video Progress Bar</p>
        <label class="toggle-container">
          <input type="checkbox" id="progressBarToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-section">
        <p>Anonymous Story Viewer</p>
        <label class="toggle-container">
          <input type="checkbox" id="anonStoryToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="footer">
      <p class="credit-text">Made with love ❤️ by <strong>archimetrix</strong></p>

      </div>
    </div>

  </div>
</body>
</html>
